name: Build ZMK firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nice_nano_v2
            shield: temper_left
            artifact-name: LEFT Temper Wireless NNv2
            snippet: studio-rpc-usb-uart
          - board: nice_nano_v2
            shield: temper_right
            artifact-name: RIGHT Temper Wireless NNv2
            snippet: ""
          - board: nice_nano_v2
            shield: settings_reset
            artifact-name: RESET Temper Wireless NNv2
            snippet: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create build directory
        run: echo "build_dir=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: Prepare variables
        shell: bash -x {0}
        env:
          BOARD: ${{ matrix.board }}
          SHIELD: ${{ matrix.shield }}
          ARTIFACT_NAME: ${{ matrix.artifact-name }}
          SNIPPET: ${{ matrix.snippet }}
        run: |
          if [ -e zephyr/module.yml ]; then
            export ZMK_LOAD_ARG=" -DZMK_EXTRA_MODULES='${GITHUB_WORKSPACE}'"
            BASE_DIR="${TMPDIR:-/tmp}/zmk-config"
            mkdir -p "${BASE_DIR}"
          else
            BASE_DIR="${GITHUB_WORKSPACE}"
          fi

          if [ -n "${SNIPPET}" ]; then
            EXTRA_WEST_ARGS="-S \"${SNIPPET}\""
          fi

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_ENV"
          echo "extra_west_args=${EXTRA_WEST_ARGS}" >> "$GITHUB_ENV"
          echo "extra_cmake_args=${SHIELD:+-DSHIELD=\"$SHIELD\"}${ZMK_LOAD_ARG}" >> "$GITHUB_ENV"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Copy config files to isolated temporary directory
        run: |
          if [ "${{ env.base_dir }}" != "${GITHUB_WORKSPACE}" ]; then
            mkdir -p "${{ env.base_dir }}/config"
            cp -R config/* "${{ env.base_dir }}/config/"
          fi

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ${{ env.base_dir }}/modules/
            ${{ env.base_dir }}/tools/
            ${{ env.base_dir }}/zephyr/
            ${{ env.base_dir }}/bootloader/
            ${{ env.base_dir }}/zmk/
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml', '**/build.yaml') }}

      - name: West Init
        working-directory: ${{ env.base_dir }}
        run: west init -l "${{ env.base_dir }}/config"

      - name: West Update
        working-directory: ${{ env.base_dir }}
        run: west update --fetch-opt=--filter=tree:0

      - name: West Zephyr export
        working-directory: ${{ env.base_dir }}
        run: west zephyr-export

      - name: West Build
        working-directory: ${{ env.base_dir }}
        shell: bash -x {0}
        run: |
          eval "west build -s zmk/app -d '${{ env.build_dir }}' -b '${{ matrix.board }}' ${{ env.extra_west_args }} -- -DZMK_CONFIG='${{ env.base_dir }}/config' ${{ env.extra_cmake_args }}"

      - name: Rename artifacts
        shell: bash -x {0}
        run: |
          mkdir -p "${{ env.build_dir }}/artifacts"
          if [ -f "${{ env.build_dir }}/zephyr/zmk.uf2" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.uf2" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.uf2"
          elif [ -f "${{ env.build_dir }}/zephyr/zmk.bin" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.bin" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.bin"
          fi

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ env.artifact_name }}
          path: ${{ env.build_dir }}/artifacts

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: firmware
          pattern: artifact-*
          delete-merged: true
